name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.27.0'

jobs:
  # ── Android APK ─────────────────────────────────────────────────────
  build-android:
    name: Android (${{ matrix.target_arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target_arch: arm64-v8a
            build_args: '--target-platform android-arm64'
          - target_arch: armeabi-v7a
            build_args: '--target-platform android-arm'
          - target_arch: x86_64
            build_args: '--target-platform android-x64'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release ${{ matrix.build_args }}

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.target_arch }}
          path: build/app/outputs/flutter-apk/*.apk

  # ── Windows ─────────────────────────────────────────────────────────
  build-windows:
    name: Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
          # Windows ARM 需要特殊的 runner，暂时只构建 x64
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          $zipName = "lokii-windows-${{ matrix.arch }}.zip"
          Compress-Archive -Path "$releaseDir/*" -DestinationPath "$zipName"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: lokii-windows-${{ matrix.arch }}.zip

  # ── Linux ───────────────────────────────────────────────────────────
  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x64
          # Linux ARM 需要 cross-compile，暂时只构建 x64
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar czf ../../../../../lokii-linux-${{ matrix.arch }}.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: lokii-linux-${{ matrix.arch }}.tar.gz

  # ── macOS ───────────────────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../lokii-macos.zip Lokii.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: lokii-macos.zip

  # ── Create Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-android, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Lokii ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Lokii ${{ steps.version.outputs.VERSION }}

            ### 下载说明

            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Android | ARM64 | `lokii-android-arm64-v8a.apk` |
            | Android | ARMv7 | `lokii-android-armeabi-v7a.apk` |
            | Android | x86_64 | `lokii-android-x86_64.apk` |
            | Windows | x64 | `lokii-windows-x64.zip` |
            | Linux | x64 | `lokii-linux-x64.tar.gz` |
            | macOS | Universal | `lokii-macos.zip` |

            **Android**: 下载 APK 文件直接安装（需要开启未知来源安装）
            **Windows**: 解压 zip 后运行 `lokii.exe`
            **Linux**: 解压 tar.gz 后运行 `lokii`
            **macOS**: 解压 zip 后运行 `Lokii.app`
          files: |
            artifacts/apk-arm64-v8a/*.apk
            artifacts/apk-armeabi-v7a/*.apk
            artifacts/apk-x86_64/*.apk
            artifacts/windows-x64/*.zip
            artifacts/linux-x64/*.tar.gz
            artifacts/macos/*.zip
          draft: false
          prerelease: false
